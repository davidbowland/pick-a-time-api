      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref SessionsTable
      Events:
        ApiKey:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /sessions/{sessionId}/users
            Method: get
            Auth:
              ApiKeyRequired: true
        Http:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions/{sessionId}/users
            Method: get
            Auth:
              Authorizer: NONE
      Timeout: 10
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2024'
        Sourcemap: true
        EntryPoints:
          - src/handlers/get-users.ts

  GetUsersLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${GetUsersFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'pick-a-time-api'
        - Key: 'created-for'
          Value: 'pick-a-time'
        - Key: 'environment'
          Value: !Ref Environment

  GetUsersLogGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
        - 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Function}'
        - Function: !FindInMap [EnvironmentMap, !Ref Environment, logStreamFunction]
      FilterPattern: '[timestamp, uuid, level="ERROR", message]'
      LogGroupName: !Ref GetUsersLogGroup

  PostUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/post-user.handler
      MemorySize: 512
      Description: pick-a-time-api create user in session
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref SessionsTable
          MAX_USERS_PER_SESSION: '20'
      Events:
        ApiKey:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /sessions/{sessionId}/users
            Method: post
            Auth:
              ApiKeyRequired: true
        Http:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions/{sessionId}/users
            Method: post
            Auth:
              Authorizer: NONE
      Timeout: 15
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2024'
        Sourcemap: true
        EntryPoints:
          - src/handlers/post-user.ts

  PostUserLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${PostUserFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'pick-a-time-api'
        - Key: 'created-for'
          Value: 'pick-a-time'
        - Key: 'environment'
          Value: !Ref Environment

  PostUserLogGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
        - 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Function}'
        - Function: !FindInMap [EnvironmentMap, !Ref Environment, logStreamFunction]
      FilterPattern: '[timestamp, uuid, level="ERROR", message]'
      LogGroupName: !Ref PostUserLogGroup

  PostUserAuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/post-user.handler
      MemorySize: 512
      Description: pick-a-time-api create authenticated user in session
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref SessionsTable
          MAX_USERS_PER_SESSION: '20'
      Events:
        ApiKey:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /sessions/{sessionId}/users/authed
            Method: post
            Auth:
              ApiKeyRequired: true
        Http:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions/{sessionId}/users/authed
            Method: post
            Auth:
              Authorizer: CognitoAuthorizer
      Timeout: 15
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2024'
        Sourcemap: true
        EntryPoints:
          - src/handlers/post-user.ts

  PostUserAuthLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${PostUserAuthFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'pick-a-time-api'
        - Key: 'created-for'
          Value: 'pick-a-time'
        - Key: 'environment'
          Value: !Ref Environment

  PostUserAuthLogGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
        - 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Function}'
        - Function: !FindInMap [EnvironmentMap, !Ref Environment, logStreamFunction]
      FilterPattern: '[timestamp, uuid, level="ERROR", message]'
      LogGroupName: !Ref PostUserAuthLogGroup

  PatchUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/patch-user.handler
      MemorySize: 1536
      Description: pick-a-time-api patch user (voting)
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref SessionsTable
      Events:
        ApiKey:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /sessions/{sessionId}/users/{userId}
            Method: patch
            Auth:
              ApiKeyRequired: true
        Http:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions/{sessionId}/users/{userId}
            Method: patch
            Auth:
              Authorizer: NONE
      Timeout: 60
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2024'
        Sourcemap: true
        EntryPoints:
          - src/handlers/patch-user.ts

  PatchUserLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${PatchUserFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'pick-a-time-api'
        - Key: 'created-for'
          Value: 'pick-a-time'
        - Key: 'environment'
          Value: !Ref Environment

  PatchUserLogGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
        - 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Function}'
        - Function: !FindInMap [EnvironmentMap, !Ref Environment, logStreamFunction]
      FilterPattern: '[timestamp, uuid, level="ERROR", message]'
      LogGroupName: !Ref PatchUserLogGroup

  PatchUserAuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/patch-user.handler
      MemorySize: 1536
      Description: pick-a-time-api patch user (authenticated)
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref SessionsTable
      Events:
        ApiKey:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /sessions/{sessionId}/users/{userId}/authed
            Method: patch
            Auth:
              ApiKeyRequired: true
        Http:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions/{sessionId}/users/{userId}/authed
            Method: patch
            Auth:
              Authorizer: CognitoAuthorizer
      Timeout: 60
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2024'
        Sourcemap: true
        EntryPoints:
          - src/handlers/patch-user.ts

  PatchUserAuthLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${PatchUserAuthFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'pick-a-time-api'
        - Key: 'created-for'
          Value: 'pick-a-time'
        - Key: 'environment'
          Value: !Ref Environment

  PatchUserAuthLogGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
        - 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Function}'
        - Function: !FindInMap [EnvironmentMap, !Ref Environment, logStreamFunction]
      FilterPattern: '[timestamp, uuid, level="ERROR", message]'
      LogGroupName: !Ref PatchUserAuthLogGroup

  ## Availability

  GetAvailabilityFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/get-availability.handler
      MemorySize: 1536
      Description: pick-a-time-api get user availability
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBReadPolicy:
            TableName: !Ref SessionsTable
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref SessionsTable
      Events:
        ApiKey:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /sessions/{sessionId}/users/{userId}/availability
            Method: get
            Auth:
              ApiKeyRequired: true
        Http:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions/{sessionId}/users/{userId}/availability
            Method: get
            Auth:
              Authorizer: NONE
      Timeout: 60
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2024'
        Sourcemap: true
        EntryPoints:
          - src/handlers/get-availability.ts

  GetAvailabilityLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${GetAvailabilityFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'pick-a-time-api'
        - Key: 'created-for'
          Value: 'pick-a-time'
        - Key: 'environment'
          Value: !Ref Environment

  GetAvailabilityLogGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
        - 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Function}'
        - Function: !FindInMap [EnvironmentMap, !Ref Environment, logStreamFunction]
      FilterPattern: '[timestamp, uuid, level="ERROR", message]'
      LogGroupName: !Ref GetAvailabilityLogGroup

  PatchAvailabilityFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/patch-availability.handler
      MemorySize: 1536
      Description: pick-a-time-api patch user availability
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref SessionsTable
      Events:
        ApiKey:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /sessions/{sessionId}/users/{userId}/availability
            Method: patch
            Auth:
              ApiKeyRequired: true
        Http:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions/{sessionId}/users/{userId}/availability
            Method: patch
            Auth:
              Authorizer: NONE
      Timeout: 60
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2024'
        Sourcemap: true
        EntryPoints:
          - src/handlers/patch-availability.ts

  PatchAvailabilityLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${PatchAvailabilityFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'pick-a-time-api'
        - Key: 'created-for'
          Value: 'pick-a-time'
        - Key: 'environment'
          Value: !Ref Environment

  PatchAvailabilityLogGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
        - 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Function}'
        - Function: !FindInMap [EnvironmentMap, !Ref Environment, logStreamFunction]
      FilterPattern: '[timestamp, uuid, level="ERROR", message]'
      LogGroupName: !Ref PatchAvailabilityLogGroup

  # Cognito — Google-only authentication

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub 'pick-a-time-${Environment}'
      UserPoolTags:
        'created-by': 'pick-a-time-api'
        'created-for': 'pick-a-time'
        'environment': !Ref Environment

  GoogleIdentityProvider:
    Type: AWS::Cognito::UserPoolIdentityProvider
    Properties:
      UserPoolId: !Ref UserPool
      ProviderName: Google
      ProviderType: Google
      ProviderDetails:
        client_id: !Ref GoogleClientId
        client_secret: !Ref GoogleClientSecret
        authorize_scopes: 'openid profile email'
      AttributeMapping:
        email: email
        name: name

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn: GoogleIdentityProvider
    Properties:
      UserPoolId: !Ref UserPool
      ClientName: !Sub 'pick-a-time-${Environment}'
      SupportedIdentityProviders:
        - Google
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - openid
        - profile
        - email
      AllowedOAuthFlowsUserPoolClient: true
      CallbackURLs:
        - !Sub
          - '${Domain}/auth/callback/'
          - Domain: !FindInMap [EnvironmentMap, !Ref Environment, corsDomain]
      LogoutURLs:
        - !Sub
          - '${Domain}/'
          - Domain: !FindInMap [EnvironmentMap, !Ref Environment, corsDomain]

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      UserPoolId: !Ref UserPool
      Domain: !Sub 'pick-a-time-auth-${Environment}'

  # DynamoDB — Single-table design

  SessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: expiration
        Enabled: true
      TableName: !FindInMap [EnvironmentMap, !Ref Environment, sessionsTable]
      Tags:
        - Key: 'created-by'
          Value: 'pick-a-time-api'
        - Key: 'created-for'
          Value: 'pick-a-time'
        - Key: 'environment'
          Value: !Ref Environment
