AWSTemplateFormatVersion: 2010-09-09
Description: >-
  API for pick-a-time project

# NOTE: The `kms:Decrypt` IAM statements below reference this AWS account's
# `aws/ssm`-managed KMS key ARN directly (arn:...:key/74085ce3-4f95-4edd-99d4-0bb17aa7b879),
# not an alias — KMS alias ARNs are not valid `Resource` matchers for `kms:Decrypt`
# in IAM identity policies. Both the test and prod stacks deploy into this same
# AWS account, so one hardcoded key ARN is correct for both. If this template is
# ever deployed to a different account, this key ID must be updated to that
# account's equivalent (or the SecureString parameters re-encrypted with it).

Transform:
  - AWS::Serverless-2016-10-31

Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues:
      - prod
      - test
    Description: Environment for deploy
  GoogleClientId:
    Type: String
    NoEcho: true
    Description: Google OAuth client ID for the Cognito identity provider (fetched from SSM by the pipeline — CFN dynamic references are not supported on this resource property)
  GoogleClientSecret:
    Type: String
    NoEcho: true
    Description: Google OAuth client secret for the Cognito identity provider (fetched from SSM by the pipeline — CFN dynamic references are not supported on this resource property)

Mappings:
  EnvironmentMap:
    prod:
      certificateRegional: cdf7b531-7189-4a69-a82c-ea54ef16729e
      corsDomain: https://pick-a-time.com
      domain: api.pick-a-time.com
      logStreamFunction: log-subscriber
      maxPollDates: '90'
      maxUsersPerSession: '20'
      sessionExpireHours: '336'
      sessionsTable: pick-a-time-api-sessions
      zoneId: Z09477181IUYK36D4AQQV
    test:
      certificateRegional: 6a48cba7-feb9-4de5-8cbf-d383140fcdef
      corsDomain: https://pick-a-time.bowland.link
      domain: pick-a-time-api.bowland.link
      logStreamFunction: log-subscriber-test
      maxPollDates: '90'
      maxUsersPerSession: '20'
      sessionExpireHours: '336'
      sessionsTable: pick-a-time-api-sessions-test
      zoneId: Z01312547RGU1BYKIJXY

Globals:
  Function:
    Runtime: nodejs24.x
    Architectures:
      - x86_64
    Tracing: Active
    Tags:
      'created-by': 'pick-a-time-api'
      'created-for': 'pick-a-time'
      'environment': !Ref Environment
    Environment:
      Variables:
        NODE_OPTIONS: '--disable-warning DEP0040'

Resources:
  # API Gateway

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Auth:
        Authorizers:
          CognitoAuthorizer:
            IdentitySource: $request.header.Authorization
            JwtConfiguration:
              issuer: !Sub
                - 'https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}'
                - UserPool: !Ref UserPool
              audience:
                - !Ref UserPoolClient
        DefaultAuthorizer: CognitoAuthorizer
      CorsConfiguration:
        AllowCredentials: true
        AllowHeaders:
          - Authorization
          - Content-Type
          - X-Amz-Date
          - X-Amz-Security-Token
          - X-Recaptcha-Token
        AllowMethods:
          - DELETE
          - GET
          - OPTIONS
          - PATCH
          - POST
          - PUT
        AllowOrigins:
          - !FindInMap [EnvironmentMap, !Ref Environment, corsDomain]
      Domain:
        BasePath:
          - /v1
        CertificateArn: !Sub
          - 'arn:aws:acm:${AWS::Region}:${AWS::AccountId}:certificate/${Certificate}'
          - Certificate: !FindInMap [EnvironmentMap, !Ref Environment, certificateRegional]
        DomainName: !FindInMap [EnvironmentMap, !Ref Environment, domain]
        EndpointConfiguration: REGIONAL
      FailOnWarnings: true
      StageName: v1

  HttpRecordSet:
    Type: AWS::Route53::RecordSet
    Properties:
      AliasTarget:
        DNSName: !Sub '${HttpApi.DomainName.RegionalDomainName}'
        HostedZoneId: !Sub '${HttpApi.DomainName.RegionalHostedZoneId}'
      HostedZoneId: !FindInMap [EnvironmentMap, !Ref Environment, zoneId]
      Name: !FindInMap [EnvironmentMap, !Ref Environment, domain]
      Type: A

  # KMS

  CalendarTokenKey:
    Type: AWS::KMS::Key
    Properties:
      Description: Encrypts Google Calendar refresh tokens at rest (pick-a-time-api)
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowAccountAdmin
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
      Tags:
        - Key: 'created-by'
          Value: 'pick-a-time-api'
        - Key: 'created-for'
          Value: 'pick-a-time'
        - Key: 'environment'
          Value: !Ref Environment

  CalendarTokenKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/pick-a-time-calendar-token-${Environment}'
      TargetKeyId: !Ref CalendarTokenKey

  # Lambda

  ## Config

  GetConfigFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/get-config.handler
      MemorySize: 512
      Description: pick-a-time-api get poll/session defaults and limits
      Policies:
        - AWSLambdaBasicExecutionRole
      Environment:
        Variables:
          MAX_POLL_DATES: !FindInMap [EnvironmentMap, !Ref Environment, maxPollDates]
          MAX_USERS_PER_SESSION: !FindInMap [EnvironmentMap, !Ref Environment, maxUsersPerSession]
          SESSION_EXPIRE_HOURS: !FindInMap [EnvironmentMap, !Ref Environment, sessionExpireHours]
      Events:
        Http:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /config
            Method: get
            Auth:
              Authorizer: NONE
      Timeout: 10
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2024'
        Sourcemap: true
        EntryPoints:
          - src/handlers/get-config.ts

  GetConfigLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${GetConfigFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'pick-a-time-api'
        - Key: 'created-for'
          Value: 'pick-a-time'
        - Key: 'environment'
          Value: !Ref Environment

  GetConfigLogGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
        - 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Function}'
        - Function: !FindInMap [EnvironmentMap, !Ref Environment, logStreamFunction]
      FilterPattern: '[timestamp, uuid, level="ERROR", message]'
      LogGroupName: !Ref GetConfigLogGroup

  ## Sessions

  PostSessionFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/post-session.handler
      MemorySize: 512
      Description: pick-a-time-api post session (unauthenticated)
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/pick-a-time/recaptcha-secret-key'
            - Effect: Allow
              Action:
                - kms:Decrypt
              Resource: !Sub 'arn:aws:kms:${AWS::Region}:${AWS::AccountId}:key/74085ce3-4f95-4edd-99d4-0bb17aa7b879'
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref SessionsTable
          MAX_POLL_DATES: !FindInMap [EnvironmentMap, !Ref Environment, maxPollDates]
          SESSION_EXPIRE_HOURS: !FindInMap [EnvironmentMap, !Ref Environment, sessionExpireHours]
      Events:
        Http:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions
            Method: post
            Auth:
              Authorizer: NONE
      Timeout: 90
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2024'
        Sourcemap: true
        EntryPoints:
          - src/handlers/post-session.ts

  PostSessionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${PostSessionFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'pick-a-time-api'
        - Key: 'created-for'
          Value: 'pick-a-time'
        - Key: 'environment'
          Value: !Ref Environment

  PostSessionLogGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
        - 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Function}'
        - Function: !FindInMap [EnvironmentMap, !Ref Environment, logStreamFunction]
      FilterPattern: '[timestamp, uuid, level="ERROR", message]'
      LogGroupName: !Ref PostSessionLogGroup

  PostSessionAuthedFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/post-session.handler
      MemorySize: 512
      Description: pick-a-time-api post session (authenticated)
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/pick-a-time/recaptcha-secret-key'
            - Effect: Allow
              Action:
                - kms:Decrypt
              Resource: !Sub 'arn:aws:kms:${AWS::Region}:${AWS::AccountId}:key/74085ce3-4f95-4edd-99d4-0bb17aa7b879'
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref SessionsTable
          MAX_POLL_DATES: !FindInMap [EnvironmentMap, !Ref Environment, maxPollDates]
          SESSION_EXPIRE_HOURS: !FindInMap [EnvironmentMap, !Ref Environment, sessionExpireHours]
      Events:
        Http:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions/authed
            Method: post
            Auth:
              Authorizer: CognitoAuthorizer
      Timeout: 90
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2024'
        Sourcemap: true
        EntryPoints:
          - src/handlers/post-session.ts

  PostSessionAuthedLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${PostSessionAuthedFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'pick-a-time-api'
        - Key: 'created-for'
          Value: 'pick-a-time'
        - Key: 'environment'
          Value: !Ref Environment

  PostSessionAuthedLogGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
        - 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Function}'
        - Function: !FindInMap [EnvironmentMap, !Ref Environment, logStreamFunction]
      FilterPattern: '[timestamp, uuid, level="ERROR", message]'
      LogGroupName: !Ref PostSessionAuthedLogGroup

  GetSessionByIdFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/get-session-by-id.handler
      MemorySize: 1536
      Description: pick-a-time-api get session by ID
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBReadPolicy:
            TableName: !Ref SessionsTable
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref SessionsTable
      Events:
        Http:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions/{sessionId}
            Method: get
            Auth:
              Authorizer: NONE
      Timeout: 10
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2024'
        Sourcemap: true
        EntryPoints:
          - src/handlers/get-session-by-id.ts

  GetSessionByIdLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${GetSessionByIdFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'pick-a-time-api'
        - Key: 'created-for'
          Value: 'pick-a-time'
        - Key: 'environment'
          Value: !Ref Environment

  GetSessionByIdLogGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
        - 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Function}'
        - Function: !FindInMap [EnvironmentMap, !Ref Environment, logStreamFunction]
      FilterPattern: '[timestamp, uuid, level="ERROR", message]'
      LogGroupName: !Ref GetSessionByIdLogGroup

  ## Users

  GetUsersFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/get-users.handler
      MemorySize: 1536
      Description: pick-a-time-api get users for session
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBReadPolicy:
            TableName: !Ref SessionsTable
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref SessionsTable
      Events:
        Http:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions/{sessionId}/users
            Method: get
            Auth:
              Authorizer: NONE
      Timeout: 10
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2024'
        Sourcemap: true
        EntryPoints:
          - src/handlers/get-users.ts

  GetUsersLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${GetUsersFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'pick-a-time-api'
        - Key: 'created-for'
          Value: 'pick-a-time'
        - Key: 'environment'
          Value: !Ref Environment

  GetUsersLogGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
        - 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Function}'
        - Function: !FindInMap [EnvironmentMap, !Ref Environment, logStreamFunction]
      FilterPattern: '[timestamp, uuid, level="ERROR", message]'
      LogGroupName: !Ref GetUsersLogGroup

  PostUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/post-user.handler
      MemorySize: 512
      Description: pick-a-time-api create user in session
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref SessionsTable
          MAX_USERS_PER_SESSION: !FindInMap [EnvironmentMap, !Ref Environment, maxUsersPerSession]
      Events:
        Http:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions/{sessionId}/users
            Method: post
            Auth:
              Authorizer: NONE
      Timeout: 15
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2024'
        Sourcemap: true
        EntryPoints:
          - src/handlers/post-user.ts

  PostUserLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${PostUserFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'pick-a-time-api'
        - Key: 'created-for'
          Value: 'pick-a-time'
        - Key: 'environment'
          Value: !Ref Environment

  PostUserLogGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
        - 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Function}'
        - Function: !FindInMap [EnvironmentMap, !Ref Environment, logStreamFunction]
      FilterPattern: '[timestamp, uuid, level="ERROR", message]'
      LogGroupName: !Ref PostUserLogGroup

  PostUserAuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/post-user.handler
      MemorySize: 512
      Description: pick-a-time-api create authenticated user in session
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref SessionsTable
          MAX_USERS_PER_SESSION: !FindInMap [EnvironmentMap, !Ref Environment, maxUsersPerSession]
      Events:
        Http:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions/{sessionId}/users/authed
            Method: post
            Auth:
              Authorizer: CognitoAuthorizer
      Timeout: 15
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2024'
        Sourcemap: true
        EntryPoints:
          - src/handlers/post-user.ts

  PostUserAuthLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${PostUserAuthFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'pick-a-time-api'
        - Key: 'created-for'
          Value: 'pick-a-time'
        - Key: 'environment'
          Value: !Ref Environment

  PostUserAuthLogGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
        - 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Function}'
        - Function: !FindInMap [EnvironmentMap, !Ref Environment, logStreamFunction]
      FilterPattern: '[timestamp, uuid, level="ERROR", message]'
      LogGroupName: !Ref PostUserAuthLogGroup

  PatchUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/patch-user.handler
      MemorySize: 1536
      Description: pick-a-time-api patch user (voting)
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref SessionsTable
      Events:
        Http:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions/{sessionId}/users/{userId}
            Method: patch
            Auth:
              Authorizer: NONE
      Timeout: 60
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2024'
        Sourcemap: true
        EntryPoints:
          - src/handlers/patch-user.ts

  PatchUserLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${PatchUserFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'pick-a-time-api'
        - Key: 'created-for'
          Value: 'pick-a-time'
        - Key: 'environment'
          Value: !Ref Environment

  PatchUserLogGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
        - 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Function}'
        - Function: !FindInMap [EnvironmentMap, !Ref Environment, logStreamFunction]
      FilterPattern: '[timestamp, uuid, level="ERROR", message]'
      LogGroupName: !Ref PatchUserLogGroup

  PatchUserAuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/patch-user.handler
      MemorySize: 1536
      Description: pick-a-time-api patch user (authenticated)
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref SessionsTable
      Events:
        Http:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions/{sessionId}/users/{userId}/authed
            Method: patch
            Auth:
              Authorizer: CognitoAuthorizer
      Timeout: 60
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2024'
        Sourcemap: true
        EntryPoints:
          - src/handlers/patch-user.ts

  PatchUserAuthLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${PatchUserAuthFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'pick-a-time-api'
        - Key: 'created-for'
          Value: 'pick-a-time'
        - Key: 'environment'
          Value: !Ref Environment

  PatchUserAuthLogGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
        - 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Function}'
        - Function: !FindInMap [EnvironmentMap, !Ref Environment, logStreamFunction]
      FilterPattern: '[timestamp, uuid, level="ERROR", message]'
      LogGroupName: !Ref PatchUserAuthLogGroup

  ## Availability

  GetAvailabilityFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/get-availability.handler
      MemorySize: 1536
      Description: pick-a-time-api get user availability
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBReadPolicy:
            TableName: !Ref SessionsTable
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref SessionsTable
      Events:
        Http:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions/{sessionId}/users/{userId}/availability
            Method: get
            Auth:
              Authorizer: NONE
      Timeout: 60
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2024'
        Sourcemap: true
        EntryPoints:
          - src/handlers/get-availability.ts

  GetAvailabilityLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${GetAvailabilityFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'pick-a-time-api'
        - Key: 'created-for'
          Value: 'pick-a-time'
        - Key: 'environment'
          Value: !Ref Environment

  GetAvailabilityLogGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
        - 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Function}'
        - Function: !FindInMap [EnvironmentMap, !Ref Environment, logStreamFunction]
      FilterPattern: '[timestamp, uuid, level="ERROR", message]'
      LogGroupName: !Ref GetAvailabilityLogGroup

  GetOverlapFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/get-overlap.handler
      MemorySize: 1536
      Description: pick-a-time-api get session overlap and recommended meetings
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource:
                - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/pick-a-time/google-calendar-client-id'
                - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/pick-a-time/google-calendar-client-secret'
            - Effect: Allow
              Action:
                - kms:Decrypt
              Resource:
                - !Sub 'arn:aws:kms:${AWS::Region}:${AWS::AccountId}:key/74085ce3-4f95-4edd-99d4-0bb17aa7b879'
                - !GetAtt CalendarTokenKey.Arn
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref SessionsTable
          KMS_CALENDAR_KEY_ID: !Ref CalendarTokenKey
          CALENDAR_SYNC_FRESHNESS_MS: '1800000'
      Events:
        Http:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions/{sessionId}/overlap
            Method: get
            Auth:
              Authorizer: NONE
      Timeout: 60
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2024'
        Sourcemap: true
        EntryPoints:
          - src/handlers/get-overlap.ts

  GetOverlapLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${GetOverlapFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'pick-a-time-api'
        - Key: 'created-for'
          Value: 'pick-a-time'
        - Key: 'environment'
          Value: !Ref Environment

  GetOverlapLogGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
        - 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Function}'
        - Function: !FindInMap [EnvironmentMap, !Ref Environment, logStreamFunction]
      FilterPattern: '[timestamp, uuid, level="ERROR", message]'
      LogGroupName: !Ref GetOverlapLogGroup

  PatchAvailabilityFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/patch-availability.handler
      MemorySize: 1536
      Description: pick-a-time-api patch user availability
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref SessionsTable
      Events:
        Http:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions/{sessionId}/users/{userId}/availability
            Method: patch
            Auth:
              Authorizer: NONE
      Timeout: 60
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2024'
        Sourcemap: true
        EntryPoints:
          - src/handlers/patch-availability.ts

  PatchAvailabilityLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${PatchAvailabilityFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'pick-a-time-api'
        - Key: 'created-for'
          Value: 'pick-a-time'
        - Key: 'environment'
          Value: !Ref Environment

  PatchAvailabilityLogGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
        - 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Function}'
        - Function: !FindInMap [EnvironmentMap, !Ref Environment, logStreamFunction]
      FilterPattern: '[timestamp, uuid, level="ERROR", message]'
      LogGroupName: !Ref PatchAvailabilityLogGroup

  ## Calendar sync

  PostCalendarConnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/post-calendar-connect.handler
      MemorySize: 512
      Description: pick-a-time-api start Google Calendar connect flow
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBReadPolicy:
            TableName: !Ref SessionsTable
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource:
                - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/pick-a-time/google-calendar-client-id'
                - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/pick-a-time/oauth-state-secret'
            - Effect: Allow
              Action:
                - kms:Decrypt
              Resource: !Sub 'arn:aws:kms:${AWS::Region}:${AWS::AccountId}:key/74085ce3-4f95-4edd-99d4-0bb17aa7b879'
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref SessionsTable
          GOOGLE_CALENDAR_REDIRECT_URI: !Sub
            - 'https://${Domain}/v1/oauth/google-calendar/callback'
            - Domain: !FindInMap [EnvironmentMap, !Ref Environment, domain]
      Events:
        Http:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions/{sessionId}/users/{userId}/calendar/connect
            Method: post
            Auth:
              Authorizer: CognitoAuthorizer
      Timeout: 30
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2024'
        Sourcemap: true
        EntryPoints:
          - src/handlers/post-calendar-connect.ts

  PostCalendarConnectLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${PostCalendarConnectFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'pick-a-time-api'
        - Key: 'created-for'
          Value: 'pick-a-time'
        - Key: 'environment'
          Value: !Ref Environment

  PostCalendarConnectLogGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
        - 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Function}'
        - Function: !FindInMap [EnvironmentMap, !Ref Environment, logStreamFunction]
      FilterPattern: '[timestamp, uuid, level="ERROR", message]'
      LogGroupName: !Ref PostCalendarConnectLogGroup

  GetCalendarCallbackFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/get-calendar-callback.handler
      MemorySize: 512
      Description: pick-a-time-api Google Calendar OAuth callback (unauthenticated, state-verified)
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource:
                - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/pick-a-time/google-calendar-client-id'
                - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/pick-a-time/google-calendar-client-secret'
                - !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/pick-a-time/oauth-state-secret'
            - Effect: Allow
              Action:
                - kms:Decrypt
              Resource: !Sub 'arn:aws:kms:${AWS::Region}:${AWS::AccountId}:key/74085ce3-4f95-4edd-99d4-0bb17aa7b879'
            - Effect: Allow
              Action:
                - kms:Encrypt
              Resource: !GetAtt CalendarTokenKey.Arn
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref SessionsTable
          KMS_CALENDAR_KEY_ID: !Ref CalendarTokenKey
          GOOGLE_CALENDAR_REDIRECT_URI: !Sub
            - 'https://${Domain}/v1/oauth/google-calendar/callback'
            - Domain: !FindInMap [EnvironmentMap, !Ref Environment, domain]
          WEB_APP_URL: !FindInMap [EnvironmentMap, !Ref Environment, corsDomain]
      Events:
        Http:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /oauth/google-calendar/callback
            Method: get
            Auth:
              Authorizer: NONE
      Timeout: 30
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2024'
        Sourcemap: true
        EntryPoints:
          - src/handlers/get-calendar-callback.ts

  GetCalendarCallbackLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${GetCalendarCallbackFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'pick-a-time-api'
        - Key: 'created-for'
          Value: 'pick-a-time'
        - Key: 'environment'
          Value: !Ref Environment

  GetCalendarCallbackLogGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
        - 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Function}'
        - Function: !FindInMap [EnvironmentMap, !Ref Environment, logStreamFunction]
      FilterPattern: '[timestamp, uuid, level="ERROR", message]'
      LogGroupName: !Ref GetCalendarCallbackLogGroup

  DeleteCalendarFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/delete-calendar.handler
      MemorySize: 512
      Description: pick-a-time-api disconnect Google Calendar
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
        - Statement:
            - Effect: Allow
              Action:
                - kms:Decrypt
              Resource: !GetAtt CalendarTokenKey.Arn
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref SessionsTable
          KMS_CALENDAR_KEY_ID: !Ref CalendarTokenKey
      Events:
        Http:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions/{sessionId}/users/{userId}/calendar
            Method: delete
            Auth:
              Authorizer: CognitoAuthorizer
      Timeout: 30
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2024'
        Sourcemap: true
        EntryPoints:
          - src/handlers/delete-calendar.ts

  DeleteCalendarLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${DeleteCalendarFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'pick-a-time-api'
        - Key: 'created-for'
          Value: 'pick-a-time'
        - Key: 'environment'
          Value: !Ref Environment

  DeleteCalendarLogGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
        - 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Function}'
        - Function: !FindInMap [EnvironmentMap, !Ref Environment, logStreamFunction]
      FilterPattern: '[timestamp, uuid, level="ERROR", message]'
      LogGroupName: !Ref DeleteCalendarLogGroup

  # Cognito — Google-only authentication

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub 'pick-a-time-${Environment}'
      UserPoolTags:
        'created-by': 'pick-a-time-api'
        'created-for': 'pick-a-time'
        'environment': !Ref Environment

  GoogleIdentityProvider:
    Type: AWS::Cognito::UserPoolIdentityProvider
    Properties:
      UserPoolId: !Ref UserPool
      ProviderName: Google
      ProviderType: Google
      ProviderDetails:
        client_id: !Ref GoogleClientId
        client_secret: !Ref GoogleClientSecret
        authorize_scopes: 'openid profile email'
      AttributeMapping:
        email: email
        name: name

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn: GoogleIdentityProvider
    Properties:
      UserPoolId: !Ref UserPool
      ClientName: !Sub 'pick-a-time-${Environment}'
      SupportedIdentityProviders:
        - Google
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - openid
        - profile
        - email
      AllowedOAuthFlowsUserPoolClient: true
      CallbackURLs:
        - !Sub
          - '${Domain}/auth/callback/'
          - Domain: !FindInMap [EnvironmentMap, !Ref Environment, corsDomain]
      LogoutURLs:
        - !Sub
          - '${Domain}/'
          - Domain: !FindInMap [EnvironmentMap, !Ref Environment, corsDomain]

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      UserPoolId: !Ref UserPool
      Domain: !Sub 'pick-a-time-auth-${Environment}'

  # DynamoDB — Single-table design

  SessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: expiration
        Enabled: true
      TableName: !FindInMap [EnvironmentMap, !Ref Environment, sessionsTable]
      Tags:
        - Key: 'created-by'
          Value: 'pick-a-time-api'
        - Key: 'created-for'
          Value: 'pick-a-time'
        - Key: 'environment'
          Value: !Ref Environment
