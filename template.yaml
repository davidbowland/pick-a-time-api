AWSTemplateFormatVersion: 2010-09-09
Description: >-
  API for pick-a-time project

# NOTE: The `kms:Decrypt` IAM statements below reference this AWS account's
# `aws/ssm`-managed KMS key ARN directly (arn:...:key/74085ce3-4f95-4edd-99d4-0bb17aa7b879),
# not an alias — KMS alias ARNs are not valid `Resource` matchers for `kms:Decrypt`
# in IAM identity policies. Both the test and prod stacks deploy into this same
# AWS account, so one hardcoded key ARN is correct for both. If this template is
# ever deployed to a different account, this key ID must be updated to that
# account's equivalent (or the SecureString parameters re-encrypted with it).

Transform:
  - AWS::Serverless-2016-10-31

Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues:
      - prod
      - test
    Description: Environment for deploy
  GoogleClientId:
    Type: String
    NoEcho: true
    Description: Google OAuth client ID for the Cognito identity provider (fetched from SSM by the pipeline — CFN dynamic references are not supported on this resource property)
  GoogleClientSecret:
    Type: String
    NoEcho: true
    Description: Google OAuth client secret for the Cognito identity provider (fetched from SSM by the pipeline — CFN dynamic references are not supported on this resource property)

Mappings:
  EnvironmentMap:
    prod:
      certificateEdge: cdf7b531-7189-4a69-a82c-ea54ef16729e
      certificateRegional: cdf7b531-7189-4a69-a82c-ea54ef16729e
      corsDomain: https://pick-a-time.com
      domain: api.pick-a-time.com
      domainInternal: api-internal.pick-a-time.com
      logStreamFunction: log-subscriber
      maxPlanWeeks: '12'
      sessionsTable: pick-a-time-api-sessions
      zoneId: Z09477181IUYK36D4AQQV
    test:
      certificateEdge: 6a48cba7-feb9-4de5-8cbf-d383140fcdef
      certificateRegional: 6a48cba7-feb9-4de5-8cbf-d383140fcdef
      corsDomain: https://pick-a-time.bowland.link
      domain: pick-a-time-api.bowland.link
      domainInternal: pick-a-time-api-internal.bowland.link
      logStreamFunction: log-subscriber-test
      maxPlanWeeks: '12'
      sessionsTable: pick-a-time-api-sessions-test
      zoneId: Z01312547RGU1BYKIJXY

Globals:
  Function:
    Runtime: nodejs24.x
    Architectures:
      - x86_64
    Tracing: Active
    Tags:
      'created-by': 'pick-a-time-api'
      'created-for': 'pick-a-time'
      'environment': !Ref Environment
    Environment:
      Variables:
        NODE_OPTIONS: '--disable-warning DEP0040'

Resources:
  # API Gateway

  Api:
    Type: AWS::Serverless::Api
    Properties:
      StageName: v1
      Auth:
        ApiKeyRequired: true
        UsagePlan:
          CreateUsagePlan: PER_API
          Description: Usage plan for pick-a-time-api
      Domain:
        DomainName: !FindInMap [EnvironmentMap, !Ref Environment, domainInternal]
        CertificateArn: !Sub
          - 'arn:aws:acm:us-east-1:${AWS::AccountId}:certificate/${Certificate}'
          - Certificate: !FindInMap [EnvironmentMap, !Ref Environment, certificateEdge]
        EndpointConfiguration: EDGE
        Route53:
          HostedZoneId: !FindInMap [EnvironmentMap, !Ref Environment, zoneId]
        BasePath:
          - /v1

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Auth:
        Authorizers:
          CognitoAuthorizer:
            IdentitySource: $request.header.Authorization
            JwtConfiguration:
              issuer: !Sub
                - 'https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}'
                - UserPool: !Ref UserPool
              audience:
                - !Ref UserPoolClient
        DefaultAuthorizer: CognitoAuthorizer
      CorsConfiguration:
        AllowCredentials: true
        AllowHeaders:
          - Authorization
          - Content-Type
          - X-Amz-Date
          - X-Amz-Security-Token
          - X-Api-Key
          - X-Recaptcha-Token
        AllowMethods:
          - DELETE
          - GET
          - OPTIONS
          - PATCH
          - POST
          - PUT
        AllowOrigins:
          - !FindInMap [EnvironmentMap, !Ref Environment, corsDomain]
      Domain:
        BasePath:
          - /v1
        CertificateArn: !Sub
          - 'arn:aws:acm:${AWS::Region}:${AWS::AccountId}:certificate/${Certificate}'
          - Certificate: !FindInMap [EnvironmentMap, !Ref Environment, certificateRegional]
        DomainName: !FindInMap [EnvironmentMap, !Ref Environment, domain]
        EndpointConfiguration: REGIONAL
      FailOnWarnings: true
      StageName: v1

  HttpRecordSet:
    Type: AWS::Route53::RecordSet
    Properties:
      AliasTarget:
        DNSName: !Sub '${HttpApi.DomainName.RegionalDomainName}'
        HostedZoneId: !Sub '${HttpApi.DomainName.RegionalHostedZoneId}'
      HostedZoneId: !FindInMap [EnvironmentMap, !Ref Environment, zoneId]
      Name: !FindInMap [EnvironmentMap, !Ref Environment, domain]
      Type: A

  # Lambda

  ## Sessions

  PostSessionFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/post-session.handler
      MemorySize: 512
      Description: pick-a-time-api post session (unauthenticated)
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/pick-a-time/recaptcha-secret-key'
            - Effect: Allow
              Action:
                - kms:Decrypt
              Resource: !Sub 'arn:aws:kms:${AWS::Region}:${AWS::AccountId}:key/74085ce3-4f95-4edd-99d4-0bb17aa7b879'
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref SessionsTable
          MAX_PLAN_WEEKS: !FindInMap [EnvironmentMap, !Ref Environment, maxPlanWeeks]
          SESSION_EXPIRE_HOURS: '24'
      Events:
        ApiKey:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /sessions
            Method: post
            Auth:
              ApiKeyRequired: true
        Http:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions
            Method: post
            Auth:
              Authorizer: NONE
      Timeout: 90
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2024'
        Sourcemap: true
        EntryPoints:
          - src/handlers/post-session.ts

  PostSessionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${PostSessionFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'pick-a-time-api'
        - Key: 'created-for'
          Value: 'pick-a-time'
        - Key: 'environment'
          Value: !Ref Environment

  PostSessionLogGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
        - 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Function}'
        - Function: !FindInMap [EnvironmentMap, !Ref Environment, logStreamFunction]
      FilterPattern: '[timestamp, uuid, level="ERROR", message]'
      LogGroupName: !Ref PostSessionLogGroup

  PostSessionAuthedFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/post-session.handler
      MemorySize: 512
      Description: pick-a-time-api post session (authenticated)
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/pick-a-time/recaptcha-secret-key'
            - Effect: Allow
              Action:
                - kms:Decrypt
              Resource: !Sub 'arn:aws:kms:${AWS::Region}:${AWS::AccountId}:key/74085ce3-4f95-4edd-99d4-0bb17aa7b879'
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref SessionsTable
          MAX_PLAN_WEEKS: !FindInMap [EnvironmentMap, !Ref Environment, maxPlanWeeks]
          SESSION_EXPIRE_HOURS: '24'
      Events:
        ApiKey:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /sessions/authed
            Method: post
            Auth:
              ApiKeyRequired: true
        Http:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions/authed
            Method: post
            Auth:
              Authorizer: CognitoAuthorizer
      Timeout: 90
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2024'
        Sourcemap: true
        EntryPoints:
          - src/handlers/post-session.ts

  PostSessionAuthedLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${PostSessionAuthedFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'pick-a-time-api'
        - Key: 'created-for'
          Value: 'pick-a-time'
        - Key: 'environment'
          Value: !Ref Environment

  PostSessionAuthedLogGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
        - 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Function}'
        - Function: !FindInMap [EnvironmentMap, !Ref Environment, logStreamFunction]
      FilterPattern: '[timestamp, uuid, level="ERROR", message]'
      LogGroupName: !Ref PostSessionAuthedLogGroup

  GetSessionByIdFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/get-session-by-id.handler
      MemorySize: 1536
      Description: pick-a-time-api get session by ID
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBReadPolicy:
            TableName: !Ref SessionsTable
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Ref SessionsTable
      Events:
        ApiKey:
          Type: Api
          Properties:
            RestApiId: !Ref Api
            Path: /sessions/{sessionId}
            Method: get
            Auth:
              ApiKeyRequired: true
        Http:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions/{sessionId}
            Method: get
            Auth:
              Authorizer: NONE
      Timeout: 10
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2024'
        Sourcemap: true
        EntryPoints:
          - src/handlers/get-session-by-id.ts

  GetSessionByIdLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${GetSessionByIdFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'pick-a-time-api'
        - Key: 'created-for'
          Value: 'pick-a-time'
        - Key: 'environment'
          Value: !Ref Environment

  GetSessionByIdLogGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
        - 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Function}'
        - Function: !FindInMap [EnvironmentMap, !Ref Environment, logStreamFunction]
      FilterPattern: '[timestamp, uuid, level="ERROR", message]'
      LogGroupName: !Ref GetSessionByIdLogGroup

  ## Users

  GetUsersFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/get-users.handler
      MemorySize: 1536
      Description: pick-a-time-api get users for session
